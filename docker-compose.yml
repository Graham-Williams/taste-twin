# taste-twin, self-hosted behind the existing Cloudflare tunnel.
#
# - Joins the external `km-tracker_default` network so the tunnel can route
#   taste-twin.graham-williams.com -> http://taste-twin:8080 by service name.
# - NO host port mapping: the app is reachable only over that network; sign-in
#   is gated by the app-level shared password (APP_PASSWORD, from the box's
#   untracked .env). The in-app Cloudflare Access JWT check is retained but
#   dormant when APP_PASSWORD is set.
# - All state lives in the named volume `taste-twin-data`.
services:
  taste-twin:
    build: .
    container_name: taste-twin
    restart: unless-stopped
    environment:
      # Sign-in is the app-level shared-password gate (APP_PASSWORD); when it is
      # set the in-app Cloudflare Access JWT check is bypassed. Leave the
      # CF_ACCESS_* vars empty-safe so the app runs with either gate (or neither
      # in local dev) — mirrors km-tracker / todoist-points.
      APP_PASSWORD: ${APP_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      CF_ACCESS_AUD: ${CF_ACCESS_AUD:-}
      CF_ACCESS_TEAM_DOMAIN: ${CF_ACCESS_TEAM_DOMAIN:-}
      APP_HOST: taste-twin.graham-williams.com
      APP_ENV: prod
      # View-only gallery: Letterboxd's Cloudflare bot-management challenges
      # the box's server IP, so live scraping fails here. New reports are
      # generated on Graham's Mac (residential IP) and synced over with
      # scripts/publish.py; the box only serves them. Viewer mode hides the
      # username form, refuses POST /run, and skips the worker/dataset ingest.
      TASTE_TWIN_VIEWER_MODE: "1"
    volumes:
      - taste-twin-data:/app/data
    networks:
      - km-tracker_default
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  taste-twin-data:

networks:
  km-tracker_default:
    external: true
