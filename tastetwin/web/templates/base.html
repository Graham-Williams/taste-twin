<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{% block head %}{% endblock %}
<title>{% block title %}taste-twin{% endblock %}</title>
<style>
  body { font-family: Georgia, 'Times New Roman', serif; background: #14181c;
         color: #d8e0e8; max-width: 760px; margin: 2rem auto; padding: 0 1rem;
         line-height: 1.55; }
  h1, h2 { font-family: 'Helvetica Neue', Arial, sans-serif; color: #fff; }
  h1 { border-bottom: 3px solid #00c030; padding-bottom: .4rem; }
  a { color: #40bcf4; text-decoration: none; }
  a:hover { text-decoration: underline; }
  nav { font-family: 'Helvetica Neue', Arial, sans-serif; margin-bottom: 1.5rem; }
  nav a { margin-right: 1.25rem; color: #9ab; }
  nav a.brand { color: #00e054; font-weight: bold; }
  .card { background: #1b2228; border-radius: 10px; padding: 1rem 1.25rem;
          margin: 1rem 0; border-left: 4px solid #00c030; }
  .card.error { border-left-color: #ff8000; }
  .muted { color: #89a; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: .45rem .6rem; border-bottom: 1px solid #2c3440; }
  th { font-family: 'Helvetica Neue', Arial, sans-serif; color: #789;
       font-variant: small-caps; letter-spacing: .04em; font-weight: normal; }
  input[type=text] { background: #2c3440; color: #fff; border: 1px solid #456;
                     border-radius: 4px; padding: .5rem .7rem; font-size: 1rem;
                     width: 16rem; max-width: 60%; }
  button { background: #00c030; color: #fff; border: none; border-radius: 4px;
           padding: .55rem 1.1rem; font-size: 1rem; cursor: pointer;
           font-family: 'Helvetica Neue', Arial, sans-serif; }
  button:hover { background: #00e054; }
  .badge { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: .8rem;
           border-radius: 4px; padding: .15rem .5rem; color: #14181c;
           font-weight: bold; text-transform: uppercase; }
  .badge.done { background: #00e054; }
  .badge.running { background: #40bcf4; }
  .badge.queued { background: #9ab; }
  .badge.failed { background: #ff8000; }
  pre.log { background: #10141a; color: #9ab; padding: .8rem 1rem;
            border-radius: 8px; font-size: .8rem; overflow-x: auto;
            white-space: pre-wrap; word-break: break-all; }
  .foot { color: #9ab; font-size: .85rem; border-top: 1px solid #345;
          margin-top: 2.5rem; padding-top: 1rem; }
</style>
</head>
<body>
<nav>
  <a class="brand" href="{{ url_for('index') }}">taste-twin</a>
  <a href="{{ url_for('index') }}">runs</a>
  <a href="{{ url_for('about') }}">about</a>
</nav>
{% block content %}{% endblock %}
<div class="foot">Public Letterboxd data only &middot; polite scraping
  (1 request/second, cached) &middot; not affiliated with Letterboxd.</div>
</body>
</html>
